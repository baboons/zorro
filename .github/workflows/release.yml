name: Release

# Build a downloadable Zorro.app (Apple Silicon) and attach it to the GitHub
# release when a v* tag is pushed. Also runnable manually (uploads an artifact).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  macos-arm64:
    name: Build macOS app (Apple Silicon)
    runs-on: macos-14 # Apple Silicon runner → native aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      # Installs the toolchain pinned in rust-toolchain.toml (1.95.0).
      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Build & bundle Zorro.app
        run: bash scripts/bundle.sh release

      - name: Zip the app bundle
        run: ditto -c -k --keepParent dist/Zorro.app dist/Zorro-aarch64-apple-darwin.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zorro-aarch64-apple-darwin
          path: dist/Zorro-aarch64-apple-darwin.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Zorro-aarch64-apple-darwin.zip
